<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Criar Conta</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #e4e8f0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: white;
    padding: 40px;
    border-radius: 18px;
    width: 350px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    text-align: center;
    animation: fade 0.6s ease-in-out;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* TITULO */
h2 {
    margin-bottom: 25px;
    color: #111827;
    font-size: 26px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    border-color: #6366f1;
    outline: none;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
}

/* BOTÃO */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
}

button:hover {
    transform: scale(1.03);
}

/* LINK */
a {
    color: #6366f1;
    font-size: 13px;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* TEXTO */
p {
    margin-top: 15px;
    font-size: 13px;
    color: #6b7280;
}
</style>

</head>

<body>

<div class="card">
    <h2>🚀 Criar Conta</h2>

    <form method="POST">
        <input name="username" placeholder="Nome de utilizador" required>
        <input type="password" name="password" placeholder="Senha segura" required>
        <button type="submit">Registar</button>
    </form>

    <p>Já tens conta? <a href="/login">Entrar aqui</a></p>
</div>

</body>
</html>
